# analysis-template.yaml
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: vllm-prometheus-smoke
  namespace: llm-inference
spec:
  metrics:
  # ========== 指标 1：P99 TTFT < 2s ==========
  - name: p99-ttft
    interval: 1m
    count: 5
    successCondition: result < 2000
    failureCondition: result >= 5000
    provider:
      prometheus:
        address: http://prometheus-server.monitoring.svc.cluster.local:9090
        query: |
          scalar(
            histogram_quantile(0.99, 
              sum(rate(vllm:time_to_first_token_seconds_bucket{namespace="llm-inference"}[2m])) by (le)
            ) * 1000
          ) or on() vector(9999)

  # ========== 指标 2：错误率 < 1% ==========
  - name: error-rate
    interval: 1m
    count: 5
    successCondition: result < 0.01
    provider:
      prometheus:
        address: http://prometheus-server.monitoring.svc.cluster.local:9090
        query: |
          scalar(
            (
              sum(rate(vllm:request_failure_total{namespace="llm-inference"}[2m])) 
              or on() vector(0)
            )
            / 
            (
              sum(rate(vllm:request_success_total{namespace="llm-inference"}[2m])) 
              or on() vector(1)
            )
          ) or on() vector(1)

  # ========== 指标 3：GPU 显存使用率 < 90%（AWQ 后仍有充足余量） ==========
  - name: gpu-memory-saturation
    interval: 1m
    count: 5
    successCondition: result < 0.9
    provider:
      prometheus:
        address: http://prometheus-server.monitoring.svc.cluster.local:9090
        query: |
          scalar(
            avg(
              nvidia_gpu_memory_used_bytes{namespace="llm-inference"} 
              / 
              nvidia_gpu_memory_total_bytes{namespace="llm-inference"}
            )
          ) or on() vector(1)
