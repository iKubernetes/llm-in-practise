# vllm-statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vllm-qwen3-8b
  namespace: llm-inference
  labels:
    app: vllm-qwen3-8b
spec:
  serviceName: vllm-headless
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: vllm-qwen3-8b
  template:
    metadata:
      labels:
        app: vllm-qwen3-8b
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
    spec:
      # ========== 反亲和性放宽：优先分散，允许同节点共享 GPU ==========
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - vllm-qwen3-8b
              topologyKey: kubernetes.io/hostname
      initContainers:
      - name: model-ready-check
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          for i in $(seq 1 300); do
            if [ -f /data/models/qwen3-8b/.ready ]; then
              echo "[$(date)] Model ready file detected on this node. Proceeding."
              exit 0
            fi
            echo "[$(date)] Waiting for model preloader... ($i/300)"
            sleep 2
          done
          echo "[$(date)] Timeout: model preloader not ready on this node"
          exit 1
        volumeMounts:
        - name: host-model-cache
          mountPath: /data/models
        resources:
          limits:
            memory: "64Mi"
            cpu: "100m"
      containers:
      - name: vllm
        #image: vllm/vllm-openai:v0.11.2
        image: lmcache/vllm-openai:v0.3.15
        args:
          - /data/models/qwen3-8b-awq
          - --served-model-name
          - qwen3-8b
          - --quantization
          - "awq"
          - --tensor-parallel-size
          - "1"
          - --max-model-len
          - "4096"
          - --max-num-batched-tokens
          - "4096"
          - --max-num-seqs
          - "16"  # <-- 降低：共享场景下保守并发
          - --enable-chunked-prefill
          - --gpu-memory-utilization
          - "0.45"  # <-- 降低：单实例约 10.8GB，双实例总和 < 24GB
          - --host
          - 0.0.0.0
          - --port
          - "8000"
          - --uvicorn-log-level
          - info
          - --kv-transfer-config
          - '{"kv_connector":"LMCacheConnectorV1", "kv_role":"kv_both"}'
        env:
          # 跨实例缓存命中必须：确保所有 Pod 的 token hash 一致
          - name: PYTHONHASHSEED
            value: "0"
          - name: LMCACHE_USE_EXPERIMENTAL
            value: "True"
          - name: LMCACHE_CHUNK_SIZE
            value: "256"
            # 启用本地CPU缓存作为 remote buffer
          - name: LMCACHE_LOCAL_CPU
            value: "True"
            # 分配 5GB CPU 内存作为本地缓存 buffer
          - name: LMCACHE_MAX_LOCAL_CPU_SIZE
            value: "5"
          - name: LMCACHE_REMOTE_URL
            value: "lm://lmcache-server.lmcache.svc.cluster.local:5555"
          - name: LMCACHE_REMOTE_SERDE
            value: "naive"
            # 保存不满 chunk 的数据
          - name: LMCACHE_SAVE_UNFULL_CHUNK
            value: "True"
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        resources:
          limits:
            nvidia.com/gpu: "1"
            memory: "24Gi" # 16Gi + 5Gi CPU 缓存 + 缓冲
            cpu: "4"
          requests:
            nvidia.com/gpu: "1"
            memory: "16Gi"
            cpu: "4"
        volumeMounts:
        - name: host-model-cache
          mountPath: /data/models
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 300
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 15
          timeoutSeconds: 5
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 60
      volumes:
      - name: host-model-cache
        hostPath:
          path: /data/models
          type: DirectoryOrCreate
