apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-d-config
  namespace: llm-inference
data:
  config.yaml: |
    server:
      host: 0.0.0.0
      port: 8000
    
    # 路由策略
    routing:
      strategy: load_aware_prefix  # 负载感知 + Prefix Cache 混合策略
      health_check:
        interval_sec: 5
        timeout_sec: 3
        failure_threshold: 2
    
    # 负载权重配置（可根据场景调整）
    load_weights:
      pending_requests: 0.4      # 等待队列长度权重
      gpu_cache_usage: 0.3       # KV Cache 占用权重
      ttft_ms: 0.2               # 首Token延迟权重
      queue_time_ms: 0.1         # 排队时间权重
    
    # 后端发现：K8s Pod 标签选择（与你的环境一致）
    discovery:
      type: kubernetes
      kubernetes:
        namespace: llm-inference
        label_selector: "app=vllm-qwen3-8b"
        port: 8000
        service_discovery_type: pod_ip  # 直连 Pod IP
    
    # 指标暴露
    metrics:
      enabled: true
      port: 9090
    
    # 日志
    logging:
      level: DEBUG
      format: json
