apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: model-preloader
  namespace: llm-inference
  labels:
    app: model-preloader
spec:
  selector:
    matchLabels:
      app: model-preloader
  template:
    metadata:
      labels:
        app: model-preloader
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - k8s-node01.magedu.com
                - k8s-node03.magedu.com
      initContainers:
      - name: model-puller
        image: minio/mc:RELEASE.2025-08-13T08-35-41Z
        env:
        - name: MINIO_ENDPOINT
          value: "http://minio.minio.svc.cluster.local:9000"
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_ACCESS_KEY
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_SECRET_KEY
        command:
        - sh
        - -c
        - |
          set -e

          # 配置 MinIO 别名
          mc alias set models $MINIO_ENDPOINT $MINIO_ACCESS_KEY $MINIO_SECRET_KEY

          MODEL_DIR=/data/models/qwen3-8b
          READY_FILE=$MODEL_DIR/.ready

          # ========== 幂等性检查：已存在则跳过 ==========
          if [ -f "$READY_FILE" ]; then
            echo "[$(date)] 模型已存在于 HostPath，跳过下载。"
            echo "[$(date)] 本地大小: $(du -sh $MODEL_DIR | cut -f1)"
            echo "[$(date)] 文件列表:"
            ls -lh $MODEL_DIR/*.safetensors 2>/dev/null | head -5
            exit 0
          fi

          echo "[$(date)] 首次同步：从MinIO下载 llm-models/Qwen3-8B ..."
          mkdir -p $MODEL_DIR

          # 从MinIO增量同步到HostPath挂载路径
          mc mirror --overwrite --remove \
            models/llm-models/Qwen3-8B/ \
            $MODEL_DIR/

          # 写入就绪标志（关键：后续重建秒级跳过）
          touch $READY_FILE
          echo "[$(date)] 同步完成。总大小: $(du -sh $MODEL_DIR | cut -f1)"

          # 关键文件校验
          for FILE in config.json tokenizer.json; do
            if [ ! -f "$MODEL_DIR/$FILE" ]; then
              echo "[$(date)] 关键文件缺失: $FILE"
              exit 1
            fi
          done
          echo "[$(date)] 关键文件校验通过"
        volumeMounts:
        - name: host-model-cache
          mountPath: /data/models
        resources:
          limits:
            memory: "2Gi"
            cpu: "2"
          requests:
            memory: "512Mi"
            cpu: "500m"
      containers:
      - name: model-watcher
        image: minio/mc:RELEASE.2025-08-13T08-35-41Z
        env:
        - name: MINIO_ENDPOINT
          value: "http://minio.minio.svc.cluster.local:9000"
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_ACCESS_KEY
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_SECRET_KEY
        command:
        - sh
        - -c
        - |
          # 配置 MinIO 别名
          mc alias set models $MINIO_ENDPOINT $MINIO_ACCESS_KEY $MINIO_SECRET_KEY

          MODEL_DIR=/data/models/qwen3-8b
          CHECK_INTERVAL=60

          echo "[$(date)] 模型监控已启动，检查间隔 ${CHECK_INTERVAL}s"

          while true; do
            missing=false

            for file in config.json tokenizer.json; do
              if [ ! -s "$MODEL_DIR/$file" ]; then
                echo "[$(date)] 缺失或为空的文件: $file"
                missing=true
                break
              fi
            done

            if ! ls "$MODEL_DIR"/*.safetensors >/dev/null 2>&1; then
              echo "[$(date)] 未找到 .safetensors 权重文件"
              missing=true
            fi

            if [ "$missing" = true ]; then
              echo "[$(date)] 检测到模型不完整，开始从 MinIO 修复..."
              if mc mirror --overwrite --remove \
                   models/llm-models/Qwen3-8B/ \
                   "$MODEL_DIR/"; then
                touch $READY_FILE
                echo "[$(date)] 修复完成"
              else
                echo "[$(date)] 修复失败，将在下一轮重试"
              fi
            else
              echo "[$(date)] 模型文件完整"
            fi

            sleep $CHECK_INTERVAL
          done
        volumeMounts:
        - name: host-model-cache
          mountPath: /data/models
        resources:
          limits:
            memory: "1Gi"
            cpu: "1"
          requests:
            memory: "256Mi"
            cpu: "250m"
      volumes:
      - name: host-model-cache
        hostPath:
          path: /data/models
          type: DirectoryOrCreate
