# sglang-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sglang-qwen3-8b
  namespace: llm-inference
  labels:
    app: sglang-qwen3-8b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sglang-qwen3-8b
  template:
    metadata:
      labels:
        app: sglang-qwen3-8b
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "30000"
        prometheus.io/path: "/metrics"
    spec:
      # 固定到 node03，与 LocalPV 同节点
      nodeSelector:
        kubernetes.io/hostname: k8s-node03.magedu.com
      initContainers:
      - name: model-puller
        image: minio/mc:RELEASE.2025-08-13T08-35-41Z
        env:
        - name: MINIO_ENDPOINT
          value: "http://minio.minio.svc.cluster.local:9000"
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_ACCESS_KEY
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_SECRET_KEY
        command:
        - sh
        - -c
        - |
          set -e
          
          # 配置 MinIO 别名
          mc alias set models $MINIO_ENDPOINT $MINIO_ACCESS_KEY $MINIO_SECRET_KEY
          
          MODEL_DIR=/data/models/qwen3-8b
          READY_FILE=$MODEL_DIR/.ready
          
          # ========== 幂等性检查：已存在则跳过 ==========
          if [ -f "$READY_FILE" ]; then
            echo "[$(date)] 模型已存在于 Local PV，跳过下载。"
            echo "[$(date)] 本地大小: $(du -sh $MODEL_DIR | cut -f1)"
            echo "[$(date)] 文件列表:"
            ls -lh $MODEL_DIR/*.safetensors 2>/dev/null | head -5
            exit 0
          fi
          
          echo "[$(date)] 首次同步：从MinIO下载qwen/qwen3-8b ..."
          mkdir -p $MODEL_DIR
          
          # 从MinIO增量同步到PVC挂载路径
          mc mirror --overwrite --remove \
            models/llm-models/Qwen3-8B/ \
            $MODEL_DIR/
          
          # 写入就绪标志（关键：后续重建秒级跳过）
          touch $READY_FILE
          echo "[$(date)] 同步完成。总大小: $(du -sh $MODEL_DIR | cut -f1)"
          
          # 关键文件校验
          for FILE in config.json tokenizer.json; do
            if [ ! -f "$MODEL_DIR/$FILE" ]; then
              echo "[$(date)] 关键文件缺失: $FILE"
              exit 1
            fi
          done
          echo "[$(date)] 关键文件校验通过"
        volumeMounts:
        - name: model-storage
          mountPath: /data/models
        resources:
          limits:
            memory: "2Gi"
            cpu: "2"
          requests:
            memory: "512Mi"
            cpu: "500m"
      containers:
        - name: sglang
          #image: lmsysorg/sglang:latest
          image: lmsysorg/sglang:v0.4.7-cu124
          command: ["python3", "-m", "sglang.launch_server"]
          args:
            - --model-path
            - /data/models/qwen3-8b
            - --host
            - 0.0.0.0
            - --port
            - "30000"
            - --tp
            - "1"
            - --dtype
            - bfloat16
            - --mem-fraction-static
            - "0.85"
            - --max-running-requests
            - "64"
            - --context-length
            - "8192"
            - --served-model-name
            - "qwen3-8b"
            - --enable-metrics
          ports:
            - containerPort: 30000
              name: http
              protocol: TCP
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: "32Gi"
              cpu: "8"
            requests:
              nvidia.com/gpu: "1"
              memory: "16Gi"
              cpu: "4"
          volumeMounts:
            - name: model-storage
              mountPath: /data/models
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 30000
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 30000
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: 30000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 60
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: qwen3-8b-model-pvc-sglang
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-service
  namespace: llm-inference
spec:
  type: ClusterIP
  selector:
    app: sglang-qwen3-8b
  ports:
    - port: 30000
      targetPort: 30000
      name: http
---
