apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen3-8b
  namespace: llm-serving
  labels:
    app: vllm-qwen3-8b
    model: qwen3-8b
    tier: level1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-qwen3-8b
  template:
    metadata:
      labels:
        app: vllm-qwen3-8b
        model: qwen3-8b
        tier: level1
    spec:
      # ========== 强制调度到 GPU 节点 ==========
      nodeSelector:
        kubernetes.io/hostname: k8s-node01.magedu.com
      runtimeClassName: nvidia

      # ========== InitContainer：模型同步与校验 ==========
      initContainers:
      - name: model-sync
        image: minio/mc:RELEASE.2025-08-13T08-35-41Z
        env:
        - name: MINIO_ENDPOINT
          value: "http://minio.minio.svc.cluster.local:9000 "
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-cred
              key: accesskey
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-cred
              key: secretkey
        command:
        - sh
        - -c
        - |
          set -e
          
          # 配置 MinIO 别名
          mc alias set models $MINIO_ENDPOINT $MINIO_ACCESS_KEY $MINIO_SECRET_KEY
          
          MODEL_DIR=/data/models/Qwen3-8B
          READY_FILE=$MODEL_DIR/.ready
          
          # ========== 幂等性检查：已存在则跳过 ==========
          if [ -f "$READY_FILE" ]; then
            echo "[$(date)]    模型已存在于 Local PV，跳过下载。"
            echo "[$(date)]    本地大小: $(du -sh $MODEL_DIR | cut -f1)"
            echo "[$(date)]    文件列表:"
            ls -lh $MODEL_DIR/*.safetensors 2>/dev/null | head -5
            exit 0
          fi
          
          echo "[$(date)] 首次同步：从MinIO下载qwen/Qwen3-8B ..."
          mkdir -p $MODEL_DIR
          
          # 从MinIO增量同步到PVC挂载路径
          # MinIO路径: bucket/models + prefix/qwen/Qwen3-8B/
          mc mirror --overwrite --remove \
            models/qwen/Qwen3-8B/ \
            $MODEL_DIR/
          
          # 写入就绪标志（关键：后续重建秒级跳过）
          touch $READY_FILE
          echo "[$(date)]  同步完成。总大小: $(du -sh $MODEL_DIR | cut -f1)"
          
          # 关键文件校验
          for FILE in config.json tokenizer.json; do
            if [ ! -f "$MODEL_DIR/$FILE" ]; then
              echo "[$(date)]  关键文件缺失: $FILE"
              exit 1
            fi
          done
          echo "[$(date)]  关键文件校验通过"
        volumeMounts:
        - name: model-data
          mountPath: /data/models
        resources:
          limits:
            memory: "2Gi"
            cpu: "2"
          requests:
            memory: "512Mi"
            cpu: "500m"

      # ========== 主容器：vLLM 推理服务 ==========
      containers:
      - name: vllm
        image: vllm/vllm-openai:v0.10.0
        #image: vllm/vllm-openai:v0.19.1-cu130-ubuntu2404
        args:
          - --model
          - /data/models/Qwen3-8B        # 指向 initContainer 同步的目录
          - --served-model-name
          - qwen3-8b
          - --port
          - "8000"
          - --enable-prefix-caching
          - --gpu-memory-utilization
          - "0.90"
          - --max-num-seqs
          - "256"
          - --max-model-len
          - "8192"
        ports:
        - containerPort: 8000
          name: http
        resources:
          limits:
            nvidia.com/gpu: 1
            memory: "12Gi"
            cpu: "4"
          requests:
            memory: "12Gi"
            cpu: "4"
        volumeMounts:
        - name: model-data
          mountPath: /data/models
          readOnly: true                  # 主容器只读，保护模型
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 300
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10

      volumes:
      - name: model-data
        persistentVolumeClaim:
          claimName: model-pvc-qwen3-8b   # 绑定 OpenEBS 动态 PVC
