apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: model-preloader-qwen3-8b
  namespace: llm-serving
  labels:
    app: model-preloader
    model: qwen3-8b
spec:
  selector:
    matchLabels:
      app: model-preloader
      model: qwen3-8b
  template:
    metadata:
      labels:
        app: model-preloader
        model: qwen3-8b
    spec:
      # 仅调度到 GPU 节点（k8s-node01 / k8s-node03）
      nodeSelector:
        nvidia.com/gpu.present: "true"
      
      containers:
      - name: model-sync
        image: minio/mc:RELEASE.2025-08-13T08-35-41Z
        env:
        - name: MINIO_ENDPOINT
          value: "http://minio.minio.svc.cluster.local:9000"
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-cred
              key: accesskey
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-cred
              key: secretkey
        - name: MODEL_NAME
          value: "Qwen3-8B"
        - name: BUCKET_PATH
          value: "qwen/Qwen3-8B"
        - name: SYNC_INTERVAL
          value: "300"
        command:
        - sh
        - -c
        - |
          set -e
          
          # 配置 MinIO 别名
          mc alias set models $MINIO_ENDPOINT $MINIO_ACCESS_KEY $MINIO_SECRET_KEY
          
          CACHE_DIR=/data/models/${MODEL_NAME}
          READY_FILE=$CACHE_DIR/.ready
          VERSION_FILE=$CACHE_DIR/.version
          LOCK_FILE=$CACHE_DIR/.sync.lock
          TEMP_DIR=$CACHE_DIR/.tmp.$$
          
          # ========== 首次启动：全量同步 ==========
          if [ ! -f "$READY_FILE" ]; then
            echo "[$(date)] 首次同步：从 MinIO 下载 ${BUCKET_PATH} ..."
            mkdir -p $CACHE_DIR
            
            mc mirror --overwrite --remove \
              models/${BUCKET_PATH}/ \
              $CACHE_DIR/
            
            # 关键文件校验
            for FILE in config.json tokenizer.json model.safetensors.index.json; do
              if [ ! -f "$CACHE_DIR/$FILE" ]; then
                echo "[$(date)] 关键文件缺失: $FILE"
                exit 1
              fi
            done
            
            # 写入版本与就绪标志
            echo "$(date +%Y%m%d-%H%M%S)" > $VERSION_FILE
            touch $READY_FILE
            echo "[$(date)] 首次同步完成。总大小: $(du -sh $CACHE_DIR | cut -f1)"
          else
            echo "[$(date)] 本地缓存已存在，进入增量同步模式。"
          fi
          
          # ========== 后台循环：增量同步与版本检测 ==========
          while true; do
            sleep $SYNC_INTERVAL
            
            # 文件锁防止并发
            if [ -f "$LOCK_FILE" ]; then
              echo "[$(date)] 检测到同步锁，跳过本次检查。"
              continue
            fi
            
            touch $LOCK_FILE
            echo "[$(date)] 执行远程差异检测..."
            
            # 使用 mc diff 检测远程是否有变更
            if mc diff models/${BUCKET_PATH}/ $CACHE_DIR/ | grep -q .; then
              echo "[$(date)] 检测到远程变更，执行原子同步..."
              
              # 1. 下载到临时目录（避免污染当前模型）
              mkdir -p $TEMP_DIR
              mc mirror --overwrite --remove \
                models/${BUCKET_PATH}/ \
                $TEMP_DIR/
              
              # 2. 关键文件校验
              for FILE in config.json tokenizer.json model.safetensors.index.json; do
                if [ ! -f "$TEMP_DIR/$FILE" ]; then
                  echo "[$(date)] 关键文件缺失: $FILE"
                  rm -rf $TEMP_DIR
                  rm -f $LOCK_FILE
                  exit 1
                fi
              done
              
              # 3. 原子替换：清理旧文件，移入新文件
              rm -f $CACHE_DIR/*.safetensors $CACHE_DIR/*.json $CACHE_DIR/*.txt \
                    $CACHE_DIR/*.model $CACHE_DIR/*.bin 2>/dev/null || true
              mv $TEMP_DIR/* $CACHE_DIR/
              rm -rf $TEMP_DIR
              
              # 4. 更新版本标志
              echo "$(date +%Y%m%d-%H%M%S)" > $VERSION_FILE
              touch $READY_FILE
              echo "[$(date)] 增量同步完成。大小: $(du -sh $CACHE_DIR | cut -f1)"
            else
              echo "[$(date)] 远程无变更，跳过。"
            fi
            
            rm -f $LOCK_FILE
          done
        volumeMounts:
        - name: model-cache
          mountPath: /data/models
        resources:
          limits:
            memory: "2Gi"
            cpu: "2"
          requests:
            memory: "512Mi"
            cpu: "500m"
      
      volumes:
      - name: model-cache
        hostPath:
          path: /data/models
          type: DirectoryOrCreate
