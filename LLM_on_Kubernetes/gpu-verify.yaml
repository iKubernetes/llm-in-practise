apiVersion: v1
kind: Pod
metadata:
  name: gpu-verify
spec:
  restartPolicy: OnFailure
  runtimeClassName: nvidia        # 使用 nvidia runtime
  nodeSelector:                   # 强制绑定到 GPU 节点
    kubernetes.io/hostname: k8s-node03.magedu.com
  #tolerations:                    # 必须：容忍 GPU 节点污点
  #  - key: "nvidia.com/gpu"
  #    operator: "Equal"
  #    value: "true"
  #    effect: "NoSchedule"
  containers:
    - name: cuda-test
      image: nvidia/cuda:12.3.1-base-ubuntu22.04
      command: ["nvidia-smi"]
      resources:
        limits:
          nvidia.com/gpu: "1"     # 请求 1 个 GPU
