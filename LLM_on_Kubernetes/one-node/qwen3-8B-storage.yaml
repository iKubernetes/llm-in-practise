# qwen3-storage.yaml
apiVersion: v1
kind: PersistentVolume
metadata:
  name: qwen3-8b-local-pv
spec:
  capacity:
    storage: 30Gi
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  volumeMode: Filesystem
  local:
    path: /data/models/Qwen3-8B
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - k8s-node01.magedu.com
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qwen3-8b-model
  namespace: default
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 30Gi
  storageClassName: local-storage
